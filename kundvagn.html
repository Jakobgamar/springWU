<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Yasir-shop.com</title>
</head>
<script src="js/script.js"></script>
<body class="kundvagn">
    <header>YS</header>
    <nav>
        <a href="">något</a>
        <a href="">något</a>
        <a href="">något</a>
    </nav>
    <section>
        Din Kundvagn
    </section>
    <main>
        <div class="hamburger-wrapper">
            <button class="hamburger-btn" onclick="toggleMenu()" aria-label="Meny">
              <span></span>
              <span></span>
              <span></span>
            </button>
      
            <div class="hamburger-menu" id="hamburgerMenu">
              <a href="">något</a>
              <a href="">något</a>
              <a href="">Erbjudanden</a>
              <a href="">Nyheter</a>
            </div>
          </div>

          <div class="produkt">
            <img src="img/motorcykel.jpg" alt="Rostig motorcykel">
            <div class="produkt-text">
              <ul>
                <li>Rostig Motorcykel</li>
                <li>699kr</li>
                <li>Säljare: namn</li>
              </ul>
            </div>
          </div>

          <div class="produkt">
            <img src="img/tvättmaskin.jpg" alt="Produkt 6">
            <div class="produkt-text">
              <ul>
                <li>Vintage Tvättmaskin</li>
                <li>1 000 000kr</li>
                <li>Säljare: namn</li>
              </ul>
            </div>
          </div>
    </main>
    <aside>
        <div class="betalnings-info">
            <h2>Betalningsinformation</h2>
            <div class="betalnings-form">
                <label for="namn">Namn på kort</label>
                <input type="text" id="namn" placeholder="Förnamn Efternamn">
    
                <label for="kortnummer">Kortnummer</label>
                <input type="text" id="kortnummer" placeholder="1234 5678 9012 3456" maxlength="19">
    
                <div class="kort">
                    <div>
                        <label for="utgångsdatum">Utgångsdatum</label>
                        <input type="text" id="utgångsdatum" placeholder="MM/ÅÅ" maxlength="5">
                    </div>
                    <div>
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3">
                    </div>
                </div>
    
                <div class="totalt">
                    <span>Totalt:</span>
                    <span>1 000 699 kr</span>
                </div>
    
                <button class="betala-btn">Betala här 💳</button>
            </div>
        </div>
    </aside>
    <footer>
        <a href="">Kontakta oss</a>
        <a href="">Info</a>
        <a href="">Kundservice</a>
        <a href="">Konto</a>
    </footer>
    
</body>
</html>
